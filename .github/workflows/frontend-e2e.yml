name: Frontend E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/ledgermate_e2e
      PORT: 4000
      APP_ORIGIN: http://127.0.0.1:4173
      JWT_ACCESS_SECRET: e2e_access_secret_12345678901234567890123456789012
      JWT_REFRESH_SECRET: e2e_refresh_secret_12345678901234567890123456789012
      ALLOW_LEGACY_USER_HEADER_AUTH: "false"
      AUTH_EXPOSE_DEV_OTP: "true"
      NODE_ENV: development
      E2E_API_BASE_URL: http://127.0.0.1:4000
      E2E_FRONTEND_URL: http://127.0.0.1:4173
      VITE_API_BASE_URL: http://127.0.0.1:4000
      VITE_ALLOW_MOCK_FALLBACK: "false"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ledgermate_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ledgermate_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Run frontend E2E smoke suite
        run: npm run test:e2e:ci

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
