services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-ledgermate}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ledgermate}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - akonta_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:change_me@db:5432/ledgermate}
      PORT: 4000
      APP_ORIGIN: http://localhost:5173
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-akonta-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-akonta-dev-refresh-secret}
      TWILIO_WEBHOOK_VALIDATE_SIGNATURE: ${TWILIO_WEBHOOK_VALIDATE_SIGNATURE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      SUBSCRIPTION_RENEWALS_ENABLED: ${SUBSCRIPTION_RENEWALS_ENABLED:-true}
      SUBSCRIPTION_RENEWALS_HOUR_UTC: ${SUBSCRIPTION_RENEWALS_HOUR_UTC:-2}
      SUBSCRIPTION_RENEWALS_MAX_BUSINESSES: ${SUBSCRIPTION_RENEWALS_MAX_BUSINESSES:-300}
      SUBSCRIPTION_RENEWAL_GRACE_DAYS: ${SUBSCRIPTION_RENEWAL_GRACE_DAYS:-5}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  akonta_pg_data:
