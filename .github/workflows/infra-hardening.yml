name: Infra Hardening

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  hardening-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build backend
        run: npm run build --prefix backend

      - name: Validate production compose file
        run: docker compose -f docker-compose.production.yml config -q

      - name: Build backend production image
        run: docker build -t akonta-backend:ci ./backend

      - name: Build frontend production image
        run: |
          docker build \
            -f Dockerfile.frontend \
            --build-arg VITE_API_BASE_URL=/api \
            --build-arg NGINX_CONF=docker/nginx/production.conf \
            -t akonta-frontend:ci .

      - name: Generate temporary TLS certs
        run: |
          mkdir -p /tmp/akonta-certs
          openssl req -x509 -nodes -days 2 -newkey rsa:2048 \
            -keyout /tmp/akonta-certs/privkey.pem \
            -out /tmp/akonta-certs/fullchain.pem \
            -subj "/CN=localhost"

      - name: Run frontend image and validate HTTPS headers
        run: |
          docker run -d --rm --name akonta-frontend-tls-test \
            -p 8443:443 \
            -v /tmp/akonta-certs:/etc/nginx/certs:ro \
            akonta-frontend:ci

          for i in $(seq 1 30); do
            if curl -kfsS https://127.0.0.1:8443/healthz > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -kI https://127.0.0.1:8443/ > /tmp/headers.txt
          cat /tmp/headers.txt
          grep -i "strict-transport-security" /tmp/headers.txt
          grep -i "x-content-type-options" /tmp/headers.txt
          grep -i "x-frame-options" /tmp/headers.txt
          grep -i "referrer-policy" /tmp/headers.txt
          grep -i "content-security-policy" /tmp/headers.txt

      - name: Collect container logs
        if: failure()
        run: |
          docker logs akonta-frontend-tls-test || true

      - name: Stop test container
        if: always()
        run: |
          docker stop akonta-frontend-tls-test || true
