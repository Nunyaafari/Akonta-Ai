name: Backend Integration

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/ledgermate_ci
      PORT: 4000
      APP_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: ci_access_secret_12345678901234567890123456789012
      JWT_REFRESH_SECRET: ci_refresh_secret_123456789012345678901234567890
      ALLOW_LEGACY_USER_HEADER_AUTH: "false"
      AUTH_EXPOSE_DEV_OTP: "true"
      API_BASE_URL: http://localhost:4000
      NODE_ENV: development

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ledgermate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ledgermate_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Backend
        run: npm run build

      - name: Apply DB Migrations
        run: npx prisma migrate deploy

      - name: Start Backend
        run: |
          nohup npm run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait For Health Endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "$API_BASE_URL/api/health" >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          tail -n 200 /tmp/backend.log || true
          exit 1

      - name: Run Integration Regression Suite
        run: npm run test:ci

      - name: Stop Backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

      - name: Upload Backend Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
